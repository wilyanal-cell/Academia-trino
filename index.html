<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Treino ABC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Treino ABC</h1>
    <nav>
      <button onclick="showMenu()">Treinos</button>
      <button onclick="showConfig()">Configuração</button>
    </nav>
  </header>

  <main>
    <div id="menu" class="section">
      <button onclick="startWorkout('A')">Iniciar Treino A</button>
      <button onclick="startWorkout('B')">Iniciar Treino B</button>
      <button onclick="startWorkout('C')">Iniciar Treino C</button>
    </div>

    <div id="workout" class="section"></div>

    <div id="config" class="section hidden">
      <h2>Configurar Treinos</h2>
      <p>Digite os exercícios, séries/reps e links de imagens:</p>
      <textarea id="configData" rows="12" style="width:100%;"></textarea>
      <button onclick="saveConfig()">Salvar Configuração</button>
    </div>

    <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
